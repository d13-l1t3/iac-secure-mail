###############################################################################
#  AutoMailDeploy — Docker Compose Orchestration
#  All variables are injected from .env by the install.sh script.
###############################################################################

services:
  # ── Postfix (SMTP) ─────────────────────────────────────────────────────────
  postfix:
    build: ./docker/postfix
    container_name: automail-postfix
    hostname: ${MAIL_HOSTNAME}
    restart: unless-stopped
    ports:
      - "25:25"       # SMTP
      - "465:465"     # SMTPS (implicit TLS)
      - "587:587"     # Submission (STARTTLS)
    volumes:
      - ./config/postfix:/etc/postfix/custom:ro
      - ./config/ssl:/etc/ssl/mail:ro
      - ./data/postfix/spool:/var/spool/postfix
      - ./data/postfix/log:/var/log
      - mail-vmail:/var/vmail
    environment:
      - MAIL_DOMAIN=${MAIL_DOMAIN}
      - MAIL_HOSTNAME=${MAIL_HOSTNAME}
      - TZ=${TZ}
    networks:
      mailnet:
        aliases:
          - postfix
    depends_on:
      - dovecot
      - rspamd

  # ── Dovecot (IMAP / LMTP) ──────────────────────────────────────────────────
  dovecot:
    build: ./docker/dovecot
    container_name: automail-dovecot
    hostname: ${MAIL_HOSTNAME}
    restart: unless-stopped
    ports:
      - "993:993"     # IMAPS
      - "143:143"     # IMAP (STARTTLS)
      - "4190:4190"   # ManageSieve
    volumes:
      - ./config/dovecot:/etc/dovecot/custom:ro
      - ./config/ssl:/etc/ssl/mail:ro
      - mail-vmail:/var/vmail
      - ./data/dovecot:/var/lib/dovecot
    environment:
      - MAIL_DOMAIN=${MAIL_DOMAIN}
      - MAIL_HOSTNAME=${MAIL_HOSTNAME}
      - TZ=${TZ}
    networks:
      mailnet:
        aliases:
          - dovecot

  # ── Rspamd (Anti-spam / DKIM) ──────────────────────────────────────────────
  rspamd:
    image: rspamd/rspamd:latest
    container_name: automail-rspamd
    restart: unless-stopped
    volumes:
      - ./config/rspamd/local.d:/etc/rspamd/local.d:ro
      - ./config/rspamd/override.d:/etc/rspamd/override.d:ro
      - ./dkim:/dkim:ro
      - ./data/rspamd:/var/lib/rspamd
    environment:
      - TZ=${TZ}
    networks:
      mailnet:
        aliases:
          - rspamd
    depends_on:
      - redis

  # ── Redis (Rspamd backend) ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: automail-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy volatile-lru --save ""
    volumes:
      - ./data/redis:/data
    networks:
      mailnet:
        aliases:
          - redis

  # ── MariaDB (Roundcube backend) ────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: automail-mariadb
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TZ=${TZ}
    volumes:
      - ./data/mariadb:/var/lib/mysql
    networks:
      mailnet:
        aliases:
          - mariadb

  # ── Roundcube (Webmail) ─────────────────────────────────────────────────────
  roundcube:
    image: roundcube/roundcubemail:latest-fpm
    container_name: automail-roundcube
    restart: unless-stopped
    environment:
      - ROUNDCUBEMAIL_DB_TYPE=mysql
      - ROUNDCUBEMAIL_DB_HOST=mariadb
      - ROUNDCUBEMAIL_DB_PORT=3306
      - ROUNDCUBEMAIL_DB_USER=${MYSQL_USER}
      - ROUNDCUBEMAIL_DB_PASSWORD=${MYSQL_PASSWORD}
      - ROUNDCUBEMAIL_DB_NAME=${MYSQL_DATABASE}
      - ROUNDCUBEMAIL_DEFAULT_HOST=ssl://dovecot
      - ROUNDCUBEMAIL_DEFAULT_PORT=993
      - ROUNDCUBEMAIL_SMTP_SERVER=tls://postfix
      - ROUNDCUBEMAIL_SMTP_PORT=587
      - ROUNDCUBEMAIL_DES_KEY=${ROUNDCUBE_DES_KEY}
      - ROUNDCUBEMAIL_SKIN=elastic
      - TZ=${TZ}
    volumes:
      - roundcube-www:/var/www/html
      - ./config/roundcube/config.inc.php:/var/roundcube/config/zcustom.inc.php:ro
      - ./data/roundcube:/var/roundcube/db
    networks:
      mailnet:
        aliases:
          - roundcube
    depends_on:
      - mariadb
      - dovecot
      - postfix

  # ── Nginx (Reverse Proxy) ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: automail-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - roundcube-www:/var/www/html:ro
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/mail.conf:/etc/nginx/conf.d/mail.conf:ro
      - ./config/ssl:/etc/ssl/mail:ro
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/nginx/log:/var/log/nginx
    networks:
      mailnet:
        aliases:
          - nginx
    depends_on:
      - roundcube
      - rspamd

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  mail-vmail:
    driver: local
  roundcube-www:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  mailnet:
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_SUBNET}
    internal: false
