# AutoMailDeploy — Fail2ban Jail Configuration
# Installed to /etc/fail2ban/jail.d/automaildeploy.conf by install.sh

[postfix-sasl]
enabled  = true
port     = smtp,465,submission
filter   = postfix[mode=auth]
logpath  = %(automail_logpath)s
maxretry = 5
findtime = 600
bantime  = 3600
action   = iptables-multiport[name=postfix-sasl, port="25,465,587", protocol=tcp]

[dovecot]
enabled  = true
port     = pop3,pop3s,imap,imaps
filter   = dovecot[mode=aggressive]
logpath  = %(automail_logpath)s
maxretry = 5
findtime = 600
bantime  = 3600
action   = iptables-multiport[name=dovecot, port="143,993,4190", protocol=tcp]
